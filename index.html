<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주 여행 기록</title>

<style>
body{
  margin:0;
  font-family:system-ui,'Malgun Gothic',sans-serif;
  background:#f0f9ff;
  color:#0f172a;
}

/* HERO */
.hero{
  height:260px;
  background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}

.hero h1{font-size:38px;margin:0;}
.hero p{opacity:.9;}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:16px;
}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  padding:16px;
  margin-top:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* MAP */
.map a{
  display:block;
  padding:6px 0;
  color:#0891b2;
  text-decoration:none;
  font-weight:600;
}

/* PLACE */
.place img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:8px;
  cursor:pointer;
}

.place a{
  color:#0891b2;
  font-weight:700;
  text-decoration:none;
}

label{
  display:flex;
  gap:8px;
  margin-top:8px;
  font-size:14px;
}

.memo{
  width:100%;
  min-height:70px;
  margin-top:8px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  padding:10px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.85);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal img{
  max-width:90%;
  max-height:80%;
  border-radius:12px;
}

.footer{
  text-align:center;
  padding:30px;
  color:#64748b;
  font-size:14px;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <h1>🌴 제주 여행</h1>
    <p>기록 · 체크 · 메모</p>
  </div>
</div>

<div class="container">

<div class="card">
  <h3>📍 지도 링크</h3>
  <div class="map">
    <a href="https://map.kakao.com/link/search/함덕해수욕장">함덕</a>
    <a href="https://map.kakao.com/link/search/종달리수국길">종달리 수국길</a>
    <a href="https://map.kakao.com/link/search/광치기해변">광치기해변</a>
    <a href="https://map.kakao.com/link/search/휴애리">휴애리</a>
    <a href="https://map.kakao.com/link/search/수월봉">수월봉</a>
  </div>
</div>

<div class="card">

<h3>🌊 DAY 1</h3>

<div class="place">

<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">

<a href="https://map.kakao.com/link/search/함덕해수욕장" target="_blank">
함덕 해수욕장
</a>

<label>
<input type="checkbox" class="visit"> 방문 완료
</label>

<textarea class="memo" placeholder="후기"></textarea>

</div>

</div>

</div>

<div class="footer">
제주 여행 기록
</div>

<!-- IMAGE MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<script>

const checks = document.querySelectorAll(".visit");

/* CHECK */
function update(){
  localStorage.setItem(
    "jeju-check",
    JSON.stringify([...checks].map(c=>c.checked))
  );
}

const saved = JSON.parse(localStorage.getItem("jeju-check")||"[]");

checks.forEach((c,i)=>{
  c.checked = saved[i] || false;
  c.addEventListener("change",update);
});

/* MEMO */
document.querySelectorAll(".memo").forEach((m,i)=>{
  m.value = localStorage.getItem("memo-"+i) || "";
  m.addEventListener("input",()=>{
    localStorage.setItem("memo-"+i,m.value);
  });
});

/* IMAGE MODAL */
function openModal(src){
  document.getElementById("modalImg").src = src;
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

document.querySelectorAll(".place img").forEach(img=>{
  img.onclick = ()=>openModal(img.src);
});

</script>

</body>
</html>
