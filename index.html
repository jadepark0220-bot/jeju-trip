<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6월 제주 여행</title>

<style>
:root{
  --ocean:#0891b2;
  --sky:#38bdf8;
  --bg:#f0f9ff;
  --card:#ffffff;
  --text:#0f172a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:system-ui, 'Malgun Gothic', sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HERO */
.hero{
  height:280px;
  background:
    linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
  border-radius:0 0 30px 30px;
}

.hero h1{font-size:40px;}
.hero p{opacity:.9;margin-top:8px;}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
}

/* PROGRESS */
.progress{
  height:16px;
  background:#e0f2fe;
  border-radius:999px;
  overflow:hidden;
  margin-top:10px;
}

.progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--sky),var(--ocean));
  transition:.3s;
}

/* DAY */
.day{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 4px 14px rgba(0,0,0,.05);
}

.day h2{margin-bottom:12px;color:var(--ocean);}

/* PLACE */
.place{
  background:#f8fafc;
  border-left:5px solid var(--ocean);
  padding:14px;
  border-radius:12px;
  margin-top:12px;
}

.place h3{margin-bottom:6px;}

label{
  display:flex;
  gap:8px;
  align-items:center;
  margin-top:8px;
  font-size:14px;
}

/* MEMO */
.memo{
  width:100%;
  min-height:90px;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  resize:none;
}

/* COST */
input[type="number"]{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #cbd5e1;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:30px;
  color:#64748b;
}
</style>
</head>

<body>

<div class="hero">
  <div>
    <h1>🌴 6월 제주 여행</h1>
    <p>바다 · 수국 · 힐링 기록</p>
  </div>
</div>

<div class="container">

<!-- PROGRESS -->
<div class="card">
  <h3 id="progressText">0 / 0 완료</h3>
  <div class="progress">
    <div id="progressFill" class="progress-fill"></div>
  </div>
</div>

<!-- DAYS -->
<div class="day">
  <h2>🌊 DAY 2</h2>

  <div class="place">
    <h3>제주4·3평화공원</h3>
    <label><input type="checkbox" class="visit"> 방문 완료</label>
    <textarea class="memo" placeholder="느낀 점"></textarea>
  </div>

  <div class="place">
    <h3>함덕 서우봉</h3>
    <label><input type="checkbox" class="visit"> 방문 완료</label>
    <textarea class="memo" placeholder="바다 후기"></textarea>
  </div>
</div>

<div class="day">
  <h2>🌺 DAY 3</h2>

  <div class="place">
    <h3>종달리 수국길</h3>
    <label><input type="checkbox" class="visit"> 방문 완료</label>
    <textarea class="memo"></textarea>
  </div>

  <div class="place">
    <h3>광치기해변</h3>
    <label><input type="checkbox" class="visit"> 방문 완료</label>
    <textarea class="memo"></textarea>
  </div>
</div>

<!-- COST -->
<div class="card">
  <h3>💰 여행 경비</h3>
  <input id="cost" type="number" placeholder="총 금액 입력">
</div>

</div>

<div class="footer">
  <p>자동 저장 기반 제주 여행 플래너</p>
</div>

<script>

const checks = document.querySelectorAll(".visit");
const memos = document.querySelectorAll(".memo");
const cost = document.getElementById("cost");

const fill = document.getElementById("progressFill");
const text = document.getElementById("progressText");

/* ---------- PROGRESS ---------- */
function updateProgress(){

  const total = checks.length;
  const done = [...checks].filter(c => c.checked).length;

  const percent = total ? (done / total) * 100 : 0;

  fill.style.width = percent + "%";
  text.textContent = `${done} / ${total} 완료`;

  localStorage.setItem("jeju-checks",
    JSON.stringify([...checks].map(c => c.checked))
  );
}

/* ---------- CHECK RESTORE ---------- */
const savedChecks = JSON.parse(localStorage.getItem("jeju-checks") || "[]");

checks.forEach((c,i)=>{
  c.checked = savedChecks[i] || false;
  c.addEventListener("change", updateProgress);
});

/* ---------- MEMO ---------- */
memos.forEach((m,i)=>{

  m.value = localStorage.getItem("memo-"+i) || "";

  m.addEventListener("input",()=>{
    localStorage.setItem("memo-"+i, m.value);
  });

});

/* ---------- COST ---------- */
cost.value = localStorage.getItem("cost") || "";

cost.addEventListener("input",()=>{
  localStorage.setItem("cost", cost.value);
});

/* INIT */
updateProgress();

</script>

</body>
</html>
