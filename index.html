<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6월 제주 여행</title>

<style>

:root{
  --ocean:#0891b2;
  --bg:#f0f9ff;
  --card:#ffffff;
  --text:#0f172a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:system-ui,'Malgun Gothic',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HERO */
.hero{
  height:320px;
  background:
    linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
}

.hero h1{font-size:42px;}
.hero p{opacity:.9;margin-top:6px;}

/* NAV TABS */
.tabs{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:12px;
  background:#fff;
  position:sticky;
  top:0;
  z-index:10;
}

.tab{
  flex:0 0 auto;
  padding:10px 14px;
  border-radius:999px;
  background:#e0f2fe;
  cursor:pointer;
  font-weight:600;
}

.tab.active{
  background:var(--ocean);
  color:white;
}

/* LAYOUT */
.container{
  max-width:900px;
  margin:auto;
  padding:16px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.06);
}

/* PLACE */
.place{
  background:#f8fafc;
  border-left:5px solid var(--ocean);
  padding:14px;
  border-radius:12px;
  margin-top:12px;
}

.place-image{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:14px;
  margin-bottom:10px;
}

.memo{
  width:100%;
  min-height:80px;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #cbd5e1;
}

/* BUTTON LINKS */
a{
  text-decoration:none;
  color:var(--ocean);
  font-weight:600;
}

/* HIDDEN DAYS */
.day{display:none;}
.day.active{display:block;}

.progress{
  height:14px;
  background:#e0f2fe;
  border-radius:999px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#38bdf8,#0891b2);
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>🌴 6월 제주 여행</h1>
    <p>2026.06.14 ~ 06.19 · 바다 · 수국 · 역사</p>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showDay(1)">DAY1</div>
  <div class="tab" onclick="showDay(2)">DAY2</div>
  <div class="tab" onclick="showDay(3)">DAY3</div>
  <div class="tab" onclick="showDay(4)">DAY4</div>
  <div class="tab" onclick="showDay(5)">DAY5</div>
  <div class="tab" onclick="showDay(6)">DAY6</div>
</div>

<div class="container">

<!-- PROGRESS -->
<div class="card">
  <h3 id="progressText">0 / 0 방문</h3>
  <div class="progress">
    <div id="fill" class="fill"></div>
  </div>
</div>

<!-- DAY 2 -->
<div class="day active" data-day="2">

<h2>DAY2 🌊</h2>

<div class="place">

<img class="place-image"
src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">

<h3>
<a href="https://map.kakao.com/link/search/제주4.3평화공원" target="_blank">
제주 4·3 평화공원
</a>
</h3>

<label>
<input type="checkbox" class="check"> 방문 완료
</label>

<textarea class="memo" placeholder="느낀 점"></textarea>

</div>

<div class="place">

<img class="place-image"
src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21">

<h3>
<a href="https://map.kakao.com/link/search/함덕해수욕장" target="_blank">
함덕 서우봉
</a>
</h3>

<label>
<input type="checkbox" class="check"> 방문 완료
</label>

<textarea class="memo"></textarea>

</div>

</div>

<!-- DAY 3 -->
<div class="day" data-day="3">
<h2>DAY3 🌺</h2>

<div class="place">

<img class="place-image"
src="https://images.unsplash.com/photo-1520975954732-35dd22299614">

<h3>
<a href="https://map.kakao.com/link/search/종달리수국길" target="_blank">
종달리 수국길
</a>
</h3>

<label><input type="checkbox" class="check"> 방문 완료</label>
<textarea class="memo"></textarea>

</div>

</div>

<!-- COST -->
<div class="card">
<h3>💰 경비</h3>

식비 <input id="food"><br><br>
입장료 <input id="ticket"><br><br>
주유비 <input id="fuel"><br><br>

<h3 id="total">총 0원</h3>
</div>

</div>

<script>

/* ---------- TAB ---------- */
function showDay(n){
  document.querySelectorAll(".day").forEach(d=>{
    d.classList.remove("active");
    if(d.dataset.day == n) d.classList.add("active");
  });

  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.remove("active");
  });

  document.querySelectorAll(".tab")[n-1].classList.add("active");
}

/* ---------- CHECK ---------- */
const checks = document.querySelectorAll(".check");
const fill = document.getElementById("fill");
const text = document.getElementById("progressText");

function update(){

  const total = checks.length;
  const done = [...checks].filter(c=>c.checked).length;

  fill.style.width = (done/total)*100 + "%";
  text.textContent = `${done} / ${total} 방문`;

  localStorage.setItem("jeju-checks",
    JSON.stringify([...checks].map(c=>c.checked))
  );
}

const saved = JSON.parse(localStorage.getItem("jeju-checks")||"[]");

checks.forEach((c,i)=>{
  c.checked = saved[i] || false;
  c.addEventListener("change",update);
});

update();

/* ---------- MEMO ---------- */
document.querySelectorAll(".memo").forEach((m,i)=>{
  m.value = localStorage.getItem("memo-"+i) || "";
  m.addEventListener("input",()=>{
    localStorage.setItem("memo-"+i,m.value);
  });
});

/* ---------- COST ---------- */
const food = document.getElementById("food");
const ticket = document.getElementById("ticket");
const fuel = document.getElementById("fuel");
const total = document.getElementById("total");

function calc(){

  const sum =
    (Number(food.value)||0) +
    (Number(ticket.value)||0) +
    (Number(fuel.value)||0);

  total.textContent = "총 " + sum.toLocaleString() + "원";

  localStorage.setItem("cost", JSON.stringify({
    food:food.value,
    ticket:ticket.value,
    fuel:fuel.value
  }));
}

const cost = JSON.parse(localStorage.getItem("cost")||"{}");

food.value = cost.food||"";
ticket.value = cost.ticket||"";
fuel.value = cost.fuel||"";

food.addEventListener("input",calc);
ticket.addEventListener("input",calc);
fuel.addEventListener("input",calc);

calc();

</script>

</body>
</html>
